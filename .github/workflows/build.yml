name: CI Builds

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux-x64, android-arm64]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Linux x64
      if: matrix.target == 'linux-x64'
      run: make clean && make -j$(nproc)

    - name: Build Android arm64
      if: matrix.target == 'android-arm64'
      run: |
        NDK_PATH=${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}
        # Use API 30 for widespread Android 11+ compatibility
        CC=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang
        echo "Using Android NDK Clang: $CC"
        make clean && make CC=$CC -j$(nproc)

    - name: Create Tarball
      run: |
        mv cbench cbench-${{ matrix.target }}
        tar -czvf cbench-${{ matrix.target }}.tar.gz cbench-${{ matrix.target }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cbench-${{ matrix.target }}
        path: cbench-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release Tag
      id: tag
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "tag=v1-${SHORT_SHA}" >> $GITHUB_OUTPUT

    - name: Create Release
      run: |
        gh release create ${{ steps.tag.outputs.tag }} \
          --title "Release ${{ steps.tag.outputs.tag }}" \
          --notes "Automated release" \
          artifacts/*/*.tar.gz
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
