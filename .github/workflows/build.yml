name: CI Builds

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux-x64, linux-arm64, android-arm64]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install ARM64 Toolchain
      if: matrix.target == 'linux-arm64'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

    - name: Build Linux x64
      if: matrix.target == 'linux-x64'
      run: make clean && make -j$(nproc)

    - name: Build Linux arm64
      if: matrix.target == 'linux-arm64'
      run: make clean && make CC=aarch64-linux-gnu-gcc -j$(nproc)

    - name: Build Android arm64
      if: matrix.target == 'android-arm64'
      run: |
        NDK_PATH=${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}
        # Use API 30 for widespread Android 11+ compatibility
        CC=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang
        echo "Using Android NDK Clang: $CC"
        make clean && make CC=$CC -j$(nproc)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cbench-${{ matrix.target }}
        path: cbench
